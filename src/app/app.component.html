<ion-app>
  <ion-split-pane contentId="main-content" when="false">

    <ion-menu contentId="main-content" type="overlay" menuId="mainMenu">
      <ion-header>
        <ion-toolbar color="success">
          <ion-title>
            <div class="menu-brand">
              <ion-icon name="home-heart-outline" class="menu-brand-icon"></ion-icon>
              Casa Hogar
            </div>
          </ion-title>
          <ion-buttons slot="end">
            <ion-menu-toggle>
              <ion-button fill="clear">
                <ion-icon name="close-outline" color="light"></ion-icon>
              </ion-button>
            </ion-menu-toggle>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <!-- perfil───────────────────────── -->
      <ion-content class="menu-content">

        <div class="menu-profile">
          <div class="menu-avatar">
            <ion-icon name="person-circle-outline"></ion-icon>
          </div>
          <div class="menu-profile-info">
            <span class="menu-profile-name">Bienvenido</span>
            <span class="menu-profile-email">Casa Hogar Peregrinos</span>
          </div>
        </div>

        <!-- ── Navegación principal ─────────────────────────── -->
        <ion-list lines="none" class="menu-nav-list">
          <ion-list-header class="menu-section-label">Navegación</ion-list-header>

          @for (p of mainPages; track p.url) {
            <ion-menu-toggle auto-hide="false">
              <ion-item
                class="menu-item"
                routerDirection="root"
                [routerLink]="[p.url]"
                routerLinkActive="menu-item-active"
                lines="none"
                detail="false"
                [attr.aria-label]="p.title"
              >
                <ion-icon slot="start" [name]="p.icon" class="menu-item-icon"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
                <ion-badge slot="end" *ngIf="p.badge" color="danger">{{ p.badge }}</ion-badge>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <!---------------------------------------------------------------------------->
        <ion-list lines="none" class="menu-nav-list">
          <ion-list-header class="menu-section-label">Mi cuenta</ion-list-header>

          @for (p of accountPages; track p.url) {
            <ion-menu-toggle auto-hide="false">
              <ion-item
                class="menu-item"
                routerDirection="root"
                [routerLink]="[p.url]"
                routerLinkActive="menu-item-active"
                lines="none"
                detail="false"
              >
                <ion-icon slot="start" [name]="p.icon" class="menu-item-icon"></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <!-- sesion close─────────── -->
        <div class="menu-footer">
          <ion-item
            class="menu-item menu-item-danger"
            lines="none"
            button="true"
            detail="false"
            (click)="cerrarSesion()"
          >
            <ion-icon slot="start" name="log-out-outline" class="menu-item-icon"></ion-icon>
            <ion-label>Cerrar sesión</ion-label>
          </ion-item>

          <p class="menu-version">Casa Hogar v1.0 · Córdoba, Ver.</p>
        </div>

      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
